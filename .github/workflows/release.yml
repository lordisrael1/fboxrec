name: release
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    # No npm token configured yet → skip the publish step and stay green
    # instead of failing every push. Add NPM_TOKEN to activate releases.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: changesets — version PR or publish
        if: env.NPM_TOKEN != ''
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: (skipped — no npm token)
        if: env.NPM_TOKEN == ''
        run: echo "NPM_TOKEN not set — skipping changesets version/publish."
