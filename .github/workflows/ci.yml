name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # Build FIRST: the crash-recovery suite exercises the built dist.
      - run: pnpm build
      - run: pnpm test

  benchmark-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # NOTE: the npm package name is fboxrec (audit M1 — a stale
      # "--filter flightbox" silently matches nothing and exits 0).
      - run: pnpm --filter fboxrec build
      - name: overhead benchmark (p99 gate)
        run: pnpm --filter fboxrec bench
        env:
          FLIGHTBOX_BENCH_GATE_PCT: '10'
